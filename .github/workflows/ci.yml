name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BookshelfReader.sln

      - name: Build
        run: dotnet build BookshelfReader.sln -c Release --no-restore

      - name: Test
        run: dotnet test BookshelfReader.sln -c Release --no-build --verbosity minimal

      - name: Pack packages
        run: dotnet pack BookshelfReader.sln -c Release --no-build --output ./nupkgs

      - name: Verify all four packages were produced
        shell: pwsh
        run: |
          $expected = @(
            "BookshelfReader.Core",
            "BookshelfReader.Infrastructure",
            "BookshelfReader.Extensions",
            "BookshelfReader.Api"
          )
          $missing = $expected | Where-Object { (Get-ChildItem "nupkgs/$_.*.nupkg" -ErrorAction SilentlyContinue).Count -eq 0 }
          if ($missing.Count -gt 0) {
            throw "Missing expected packages:`n$($missing -join "`n")"
          }

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg
          if-no-files-found: error
