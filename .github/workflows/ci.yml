name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BookshelfReader.sln

      - name: Build
        run: dotnet build BookshelfReader.sln -c Release --no-restore

      - name: Test
        run: dotnet test BookshelfReader.sln -c Release --no-build --verbosity minimal

      - name: Pack packages
        run: dotnet pack BookshelfReader.sln -c Release --no-build --output ./nupkgs

      - name: Verify the package was produced
        shell: pwsh
        run: |
          if ((Get-ChildItem "nupkgs/BookshelfReader.*.nupkg" -ErrorAction SilentlyContinue).Count -eq 0) {
            throw "Missing expected package: BookshelfReader.*.nupkg"
          }

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg
          if-no-files-found: error
