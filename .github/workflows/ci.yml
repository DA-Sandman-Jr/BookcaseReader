name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BookshelfReader.sln

      - name: Build
        run: dotnet build BookshelfReader.sln -c Release --no-restore

      - name: Test
        run: dotnet test BookshelfReader.sln -c Release --no-build --verbosity minimal

      - name: Pack API package
        run: dotnet pack BookshelfReader.Api/BookshelfReader.Api.csproj -c Release --no-build

      - name: Pack Extensions package
        run: dotnet pack BookshelfReader.Extensions/BookshelfReader.Extensions.csproj -c Release --no-build

      - name: Verify package count
        shell: pwsh
        run: |
          $packages = @(
            "BookshelfReader.Api/bin/Release/BookshelfReader.Api.1.0.0.nupkg",
            "BookshelfReader.Extensions/bin/Release/BookshelfReader.Extensions.1.0.0.nupkg"
          )
          $missing = $packages | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            throw "Missing expected packages:`n$($missing -join "`n")"
          }

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            BookshelfReader.Api/bin/Release/BookshelfReader.Api.1.0.0.nupkg
            BookshelfReader.Extensions/bin/Release/BookshelfReader.Extensions.1.0.0.nupkg
          if-no-files-found: error
